<svg xmlns="http://www.w3.org/2000/svg" width="930" height="500" viewBox="0 0 930 500" role="img" aria-label="special projects">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="52%" stop-color="#0f766e"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <style>.title{font:800 28px ui-monospace,Menlo,Consolas,monospace;fill:#ecfeff}.small{font:500 12px ui-monospace,Menlo,Consolas,monospace;fill:#cbd5e1}.value{font:800 21px ui-monospace,Menlo,Consolas,monospace;fill:#fff}</style>
  </defs>
  <rect width="930" height="500" rx="22" fill="url(#bg)"/>
  <circle cx="72" cy="34" r="6" fill="#5eead4"><animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/></circle>
  <text x="92" y="43" class="title">special projects</text>
  <rect x="36" y="92" width="858" height="300" rx="18" fill="#020617" fill-opacity=".42" stroke="#99f6e4" stroke-opacity=".2"/>
  <text x="64" y="168" class="value">repo / org cards</text>
  <text x="64" y="210" class="small">add targets to profile-special-projects.json; workflow renders stars, forks, commits, language, and links</text>
  <rect x="64" y="250" width="520" height="8" rx="4" fill="#5eead4" opacity=".78"><animate attributeName="width" values="24;520" dur="1.3s" fill="freeze"/></rect>
</svg>
