<svg xmlns="http://www.w3.org/2000/svg" width="930" height="320" viewBox="0 0 930 320" role="img" aria-label="engineering ledger">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="52%" stop-color="#0f766e"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <style>.title{font:800 28px ui-monospace,Menlo,Consolas,monospace;fill:#ecfeff}.label{font:700 13px ui-monospace,Menlo,Consolas,monospace;fill:#ccfbf1}.value{font:800 21px ui-monospace,Menlo,Consolas,monospace;fill:#fff}.small{font:500 12px ui-monospace,Menlo,Consolas,monospace;fill:#cbd5e1}</style>
  </defs>
  <rect width="930" height="320" rx="22" fill="url(#bg)"/>
  <circle cx="72" cy="34" r="6" fill="#5eead4"><animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/></circle>
  <text x="92" y="43" class="title">engineering ledger</text>
  <rect x="36" y="82" width="858" height="168" rx="18" fill="#020617" fill-opacity=".42" stroke="#99f6e4" stroke-opacity=".2"/>
  <text x="64" y="136" class="value">workflow generated</text>
  <text x="64" y="176" class="small">commits, PRs, reviews, issues, stars, forks, private-visible contribution signal</text>
  <text x="64" y="216" class="label">runs from GitHub API evidence</text>
