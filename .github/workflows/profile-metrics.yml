name: Generate profile metrics

on:
  schedule:
    - cron: "33 5 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-metrics.yml"

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Full engineering signal
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          committer_branch: metrics
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          template: terminal
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24

      - name: Compact repository intelligence
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-repositories.svg
          committer_branch: metrics
          base: ""
          config_timezone: America/Sao_Paulo
          template: classic
          plugin_repositories: yes
          plugin_repositories_featured: kleeedolinux/kleeedolinux
          plugin_repositories_pinned: 6
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: icons
